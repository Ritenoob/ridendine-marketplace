      <text x="914" y="147" font-size="15" font-weight="800" fill="#172033">Checkout Idempotency</text>
      <text x="914" y="170" font-size="12" fill="#64748b">checkout_idempotency_keys</text>
    </g>

    <g id="order">
      <rect x="1180" y="120" width="220" height="72" rx="14" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
