      <text x="1194" y="170" font-size="12" fill="#64748b">orders + order_items</text>
    </g>

    <g id="stripe-pi">
      <rect x="60" y="320" width="220" height="72" rx="14" fill="#fff7ed" stroke="#f0b45f" stroke-width="2"/>
      <text x="74" y="347" font-size="15" font-weight="800" fill="#172033">Stripe PaymentIntent</text>
      <text x="74" y="370" font-size="12" fill="#64748b">order metadata</text>
    </g>

    <g id="authorize">
      <rect x="340" y="320" width="220" height="72" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
      <text x="354" y="347" font-size="15" font-weight="800" fill="#172033">Authorize Payment</text>
      <text x="354" y="370" font-size="12" fill="#64748b">engine.orderCreation</text>
    </g>

