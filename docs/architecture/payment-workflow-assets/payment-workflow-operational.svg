    <g id="failure">
      <rect x="340" y="520" width="220" height="72" rx="14" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
      <text x="354" y="547" font-size="15" font-weight="800" fill="#172033">Payment Failed</text>
      <text x="354" y="570" font-size="12" fill="#64748b">handle failure</text>
    </g>

    <g id="refund">
