      <text x="74" y="170" font-size="12" fill="#64748b">cart / checkout UI</text>
    </g>

    <g id="checkout-api">
      <rect x="340" y="120" width="220" height="72" rx="14" fill="#fff7ed" stroke="#f0b45f" stroke-width="2"/>
      <text x="354" y="147" font-size="15" font-weight="800" fill="#172033">POST /api/checkout</text>
      <text x="354" y="170" font-size="12" fill="#64748b">checkout route</text>
    </g>

    <g id="auth">
      <rect x="620" y="70" width="220" height="72" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
      <text x="634" y="97" font-size="15" font-weight="800" fill="#172033">Auth + Validation</text>
      <text x="634" y="120" font-size="12" fill="#64748b">customer, schema, risk</text>
    </g>

    <g id="cart-menu">
      <rect x="620" y="170" width="220" height="72" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
      <text x="634" y="197" font-size="15" font-weight="800" fill="#172033">Cart/Menu Checks</text>
      <text x="634" y="220" font-size="12" fill="#64748b">price + availability</text>
    </g>

    <g id="idem">
