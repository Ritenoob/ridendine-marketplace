      <text x="634" y="547" font-size="15" font-weight="800" fill="#172033">Refund Event</text>
      <text x="634" y="570" font-size="12" fill="#64748b">charge.refunded</text>
    </g>

    <g id="finance">
      <rect x="900" y="520" width="220" height="72" rx="14" fill="#fff7ed" stroke="#f0b45f" stroke-width="2"/>
