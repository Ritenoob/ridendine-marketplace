<path d="M 570 196 L 650 286" fill="none" stroke="#64748b" stroke-width="2.5"  marker-end="url(#arrow)"/>
<path d="M 870 106 L 950 106" fill="none" stroke="#64748b" stroke-width="2.5"  marker-end="url(#arrow)"/>
<path d="M 870 196 L 950 196" fill="none" stroke="#64748b" stroke-width="2.5"  marker-end="url(#arrow)"/>
<path d="M 870 286 L 950 286" fill="none" stroke="#64748b" stroke-width="2.5"  marker-end="url(#arrow)"/>
<path d="M 1170 106 L 1250 151" fill="none" stroke="#64748b" stroke-width="2.5"  marker-end="url(#arrow)"/>
