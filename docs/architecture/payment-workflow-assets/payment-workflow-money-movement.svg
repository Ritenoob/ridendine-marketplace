<path d="M 570 416 L 650 416" fill="none" stroke="#64748b" stroke-width="2.5"  marker-end="url(#arrow)"/>
<path d="M 870 416 L 950 416" fill="none" stroke="#64748b" stroke-width="2.5"  marker-end="url(#arrow)"/>
<path d="M 460 232 L 460 380" fill="none" stroke="#64748b" stroke-width="2.5" stroke-dasharray="7 7" marker-end="url(#arrow)"/>

    <g id="card">
      <rect x="70" y="160" width="220" height="72" rx="14" fill="#fff7ed" stroke="#f0b45f" stroke-width="2"/>
      <text x="84" y="187" font-size="15" font-weight="800" fill="#172033">Customer Card Payment</text>
      <text x="84" y="210" font-size="12" fill="#64748b">Stripe PaymentIntent</text>
    </g>

    <g id="merchant">
      <rect x="350" y="160" width="220" height="72" rx="14" fill="#fff7ed" stroke="#f0b45f" stroke-width="2"/>
